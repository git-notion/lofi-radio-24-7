<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lo-fi Cafe</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="visually-hidden">
        <div id="player"></div>
    </div>
    <div class="container">
        <div class="toprow">
            <div class="time">
                <h3 id="current-song">Now playing : </h3>
                <h1 id="clock">Loading...</h1>
                <h3>Time to lock in!</h3>
            </div>
            <div class="rightup">
                <div class="handles">
                    <button id="button" title="facebook">
                        <img src="https://www.svgrepo.com/show/494341/facebook.svg" alt="" id="fb">
                    </button>
                    <button id="button" title="github">
                        <img src="https://www.svgrepo.com/show/521688/github.svg" alt="" id="shady">
                    </button>
                </div>
                <!-- <div class="todo"></div> -->
            </div>
        </div>

        <div class="bottomleft">
            <button id="prev-btn" class="text-btn">Prev</button>
            <button id="pause-btn">
                <img src="https://www.svgrepo.com/show/535553/pause.svg" alt="" class="shady">
            </button>
            <button id="play-btn">
                <img src="https://www.svgrepo.com/show/535571/play.svg" alt="" class="shady">
            </button>
            <button id="next-btn" class="text-btn">Next</button>
        </div>
    </div>
</body>
<script src="ytapi.js"></script>
<script>
    //controlling the clock
    const clk = document.getElementById('clock');
    function upclock() {
        const now = new Date()
        const timestr = now.toLocaleTimeString();
        clk.textContent = timestr;
    }
    upclock();
    setInterval(upclock, 1000)

    //link ref
    document.getElementById('shady').addEventListener('click',function(){
        window.open("https://github.com/git-notion", "_blank");
    })
</script>

</html>
